<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח בקרה - מערכת רישום</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .scrollbar::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 4px; }
        .modal-backdrop { background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen bg-slate-100">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="font-extrabold text-slate-800 text-base leading-tight">לוח בקרה — מנהל</h1>
                    <p id="adminName" class="text-sm text-indigo-600 font-semibold">טוען...</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openCreateFeeder()"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-bold text-sm transition shadow flex items-center gap-1.5">
                    <span class="text-lg leading-none">+</span> ישיבה קטנה חדשה
                </button>
                <button onclick="doLogout()" class="text-slate-500 hover:text-red-600 hover:bg-red-50 px-4 py-2 rounded-xl transition font-semibold text-sm border border-slate-200 hover:border-red-200">
                    יציאה
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

        <!-- Stats -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">סה"כ נרשמו</p>
                <p id="statTotal"    class="text-3xl font-extrabold text-slate-800">—</p>
            </div>
            <div class="bg-amber-50 rounded-2xl p-5 border border-amber-100 shadow-sm">
                <p class="text-amber-600 text-xs font-semibold uppercase tracking-wide mb-1">ממתינים לבדיקה</p>
                <p id="statPending"  class="text-3xl font-extrabold text-amber-600">—</p>
            </div>
            <div class="bg-green-50 rounded-2xl p-5 border border-green-100 shadow-sm">
                <p class="text-green-600 text-xs font-semibold uppercase tracking-wide mb-1">התקבלו למבחן</p>
                <p id="statApproved" class="text-3xl font-extrabold text-green-600">—</p>
            </div>
            <div class="bg-red-50 rounded-2xl p-5 border border-red-100 shadow-sm">
                <p class="text-red-500 text-xs font-semibold uppercase tracking-wide mb-1">לא התקבלו</p>
                <p id="statRejected" class="text-3xl font-extrabold text-red-500">—</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 mb-6 flex flex-wrap gap-3 items-center">
            <input id="searchInput" type="text" placeholder="🔍  חיפוש לפי שם או ת.ז."
                class="border-2 border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none transition-all flex-1 min-w-[200px]"
                oninput="applyFilters()">
            <select id="filterFeeder" onchange="applyFilters()"
                class="border-2 border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-indigo-400 outline-none transition-all bg-white cursor-pointer min-w-[180px]">
                <option value="">כל הישיבות הקטנות</option>
            </select>
            <select id="filterStatus" onchange="applyFilters()"
                class="border-2 border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-indigo-400 outline-none transition-all bg-white cursor-pointer min-w-[150px]">
                <option value="">כל הסטטוסים</option>
                <option value="pending">ממתין</option>
                <option value="approved">התקבל</option>
                <option value="rejected">לא התקבל</option>
            </select>
            <span id="filteredCount" class="text-sm text-slate-500 font-medium"></span>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto scrollbar">
                <table class="w-full text-sm text-right">
                    <thead class="bg-slate-50 border-b-2 border-slate-200 sticky top-0">
                        <tr>
                            <th class="px-4 py-3 font-bold text-slate-700">שם מלא</th>
                            <th class="px-4 py-3 font-bold text-slate-700 border-r border-slate-200">ת.ז.</th>
                            <th class="px-4 py-3 font-bold text-slate-700 border-r border-slate-200">ישיבה קטנה</th>
                            <th class="px-4 py-3 font-bold text-slate-700 border-r border-slate-200">עיר</th>
                            <th class="px-4 py-3 font-bold text-slate-700 border-r border-slate-200">מייל הורים</th>
                            <th class="px-4 py-3 font-bold text-slate-700 border-r border-slate-200">תאריך הגשה</th>
                            <th class="px-4 py-3 font-bold text-slate-700 border-r border-slate-200">סטטוס</th>
                            <th class="px-4 py-3 font-bold text-slate-700 border-r border-slate-200">פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="studentsBody">
                        <tr><td colspan="8" class="text-center py-16 text-slate-400 font-medium">טוען נתונים...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ===== STUDENT DETAIL MODAL ===== -->
    <div id="detailModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between px-7 py-5 border-b border-slate-200">
                <h2 id="modalTitle" class="text-xl font-extrabold text-slate-800"></h2>
                <button onclick="closeModal('detailModal')" class="text-slate-400 hover:text-slate-700 text-2xl font-bold leading-none">✕</button>
            </div>
            <div id="modalBody" class="overflow-y-auto p-7 text-sm space-y-3 scrollbar"></div>
            <div class="px-7 py-5 border-t border-slate-200 flex flex-wrap gap-3 justify-between items-center">
                <div class="flex gap-2 flex-wrap">
                    <button onclick="setStatus('approved')"
                        class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-xl font-bold text-sm transition shadow flex items-center gap-1.5">
                        ✓ התקבל למבחן
                    </button>
                    <button onclick="setStatus('rejected')"
                        class="bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm transition shadow flex items-center gap-1.5">
                        ✕ לא התקבל
                    </button>
                    <button onclick="setStatus('pending')"
                        class="bg-amber-400 hover:bg-amber-500 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition">
                        ממתין
                    </button>
                </div>
                <button onclick="closeModal('detailModal')" class="text-slate-500 hover:text-slate-800 font-semibold text-sm px-4 py-2 rounded-xl hover:bg-slate-100 transition">
                    סגור
                </button>
            </div>
        </div>
    </div>

    <!-- ===== CREATE FEEDER MODAL ===== -->
    <div id="createFeederModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md">
            <div class="flex items-center justify-between px-7 py-5 border-b border-slate-200">
                <h2 class="text-xl font-extrabold text-slate-800">הוספת ישיבה קטנה</h2>
                <button onclick="closeModal('createFeederModal')" class="text-slate-400 hover:text-slate-700 text-2xl font-bold leading-none">✕</button>
            </div>
            <div class="p-7 space-y-4">
                <p id="createFeederError" class="hidden bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl text-sm font-semibold"></p>
                <p id="createFeederSuccess" class="hidden bg-green-50 border border-green-200 text-green-700 p-3 rounded-xl text-sm font-semibold"></p>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">שם הישיבה הקטנה <span class="text-red-500">*</span></label>
                    <input type="text" id="newFeederName" placeholder='ישיבת "כסף משנה" רחובות'
                        class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none transition font-medium">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">מייל <span class="text-red-500">*</span></label>
                    <input type="email" id="newFeederEmail" placeholder="rosh@yeshiva.org" dir="ltr"
                        class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none transition font-medium">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">סיסמה ראשונית <span class="text-red-500">*</span></label>
                    <input type="text" id="newFeederPassword" placeholder="לפחות 8 תווים" dir="ltr"
                        class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 outline-none transition font-medium">
                </div>
                <button onclick="createFeederAccount()" id="createFeederBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-xl font-bold text-base transition shadow-lg flex items-center justify-center gap-2">
                    <span id="createBtnText">צור חשבון</span>
                    <svg id="createSpinner" class="hidden animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== Firebase =====
        const firebaseConfig = {
            apiKey: "AIzaSyBjFzsDY5n990Rd2-F_jU8-Y_SKTeswsb8",
            authDomain: "smartreg26.firebaseapp.com",
            projectId: "smartreg26",
            storageBucket: "smartreg26.firebasestorage.app",
            messagingSenderId: "40501808540",
            appId: "1:40501808540:web:840e7aa6a136fab1ab0c59"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db   = firebase.firestore();

        // ===== State =====
        let currentUser     = null;
        let currentUserData = null;
        let allStudents     = [];   // raw from Firestore
        let filtered        = [];   // after filters
        let selectedDocId   = null; // for detail modal
        let unsubscribe     = null;

        const statusLabel = { pending: 'ממתין', approved: 'התקבל', rejected: 'לא התקבל' };
        const statusCls   = {
            pending:  'bg-amber-100 text-amber-700',
            approved: 'bg-green-100 text-green-700',
            rejected: 'bg-red-100 text-red-700'
        };

        // ===== Auth =====
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) { window.location.href = 'login.html'; return; }
            const role = doc.data().role;
            if (role !== 'admin' && role !== 'superadmin') { window.location.href = 'login.html'; return; }
            currentUser     = user;
            currentUserData = doc.data();
            document.getElementById('adminName').textContent = currentUserData.name || user.email;
            startListening();
        });

        function doLogout() {
            if (unsubscribe) unsubscribe();
            auth.signOut().then(() => window.location.href = 'login.html');
        }

        // ===== Real-time listener =====
        function startListening() {
            let query = db.collection('students');
            // Superadmin sees all; admin sees their yeshiva only
            if (currentUserData.role === 'admin') {
                query = query.where('yeshivaId', '==', currentUserData.yeshivaId);
            }
            unsubscribe = query.onSnapshot(snap => {
                allStudents = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
                allStudents.sort((a,b) => (b.uploadedAt?.toDate?.() || 0) - (a.uploadedAt?.toDate?.() || 0));
                updateStats();
                populateFeederFilter();
                applyFilters();
            });
        }

        function updateStats() {
            let total = 0, pending = 0, approved = 0, rejected = 0;
            allStudents.forEach(s => {
                total++;
                if (s.status === 'pending')  pending++;
                if (s.status === 'approved') approved++;
                if (s.status === 'rejected') rejected++;
            });
            document.getElementById('statTotal').textContent    = total;
            document.getElementById('statPending').textContent  = pending;
            document.getElementById('statApproved').textContent = approved;
            document.getElementById('statRejected').textContent = rejected;
        }

        function populateFeederFilter() {
            const sel = document.getElementById('filterFeeder');
            const current = sel.value;
            const feeders = [...new Set(allStudents.map(s => s.feederName).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">כל הישיבות הקטנות</option>' +
                feeders.map(f => `<option value="${f}">${f}</option>`).join('');
            if (current) sel.value = current;
        }

        // ===== Filters =====
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const feeder = document.getElementById('filterFeeder').value;
            const status = document.getElementById('filterStatus').value;

            filtered = allStudents.filter(s => {
                if (feeder && s.feederName !== feeder) return false;
                if (status && s.status !== status)     return false;
                if (search) {
                    const name = `${s.lastName||''} ${s.firstName||''}`.toLowerCase();
                    if (!name.includes(search) && !(s.idNumber||'').includes(search)) return false;
                }
                return true;
            });

            document.getElementById('filteredCount').textContent =
                filtered.length !== allStudents.length ? `${filtered.length} מתוך ${allStudents.length}` : `${allStudents.length} תלמידים`;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('studentsBody');
            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-16 text-slate-400 font-medium">לא נמצאו תלמידים</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(s => {
                const dt  = s.uploadedAt?.toDate?.();
                const ds  = dt ? `${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}` : '—';
                return `<tr class="hover:bg-indigo-50/30 transition cursor-pointer" onclick="openDetail('${s._docId}')">
                    <td class="px-4 py-3 font-semibold text-slate-800">${s.lastName||''} ${s.firstName||''}</td>
                    <td class="px-4 py-3 font-mono text-slate-600 border-r border-slate-100">${s.idNumber||''}</td>
                    <td class="px-4 py-3 text-slate-600 border-r border-slate-100">${s.feederName||''}</td>
                    <td class="px-4 py-3 text-slate-600 border-r border-slate-100">${s.city||''}</td>
                    <td class="px-4 py-3 text-slate-500 border-r border-slate-100">${s.parentEmail||''}</td>
                    <td class="px-4 py-3 text-slate-500 border-r border-slate-100">${ds}</td>
                    <td class="px-4 py-3 border-r border-slate-100">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${statusCls[s.status]||'bg-slate-100 text-slate-600'}">
                            ${statusLabel[s.status]||s.status}
                        </span>
                    </td>
                    <td class="px-4 py-3 border-r border-slate-100">
                        <div class="flex gap-1" onclick="event.stopPropagation()">
                            <button onclick="quickStatus('${s._docId}','approved')"
                                class="bg-green-100 hover:bg-green-200 text-green-700 px-2.5 py-1 rounded-lg text-xs font-bold transition" title="התקבל">✓</button>
                            <button onclick="quickStatus('${s._docId}','rejected')"
                                class="bg-red-100 hover:bg-red-200 text-red-600 px-2.5 py-1 rounded-lg text-xs font-bold transition" title="לא התקבל">✕</button>
                            <button onclick="openDetail('${s._docId}')"
                                class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-2.5 py-1 rounded-lg text-xs font-bold transition">פרטים</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        // ===== Detail Modal =====
        function openDetail(docId) {
            const s = allStudents.find(x => x._docId === docId);
            if (!s) return;
            selectedDocId = docId;
            document.getElementById('modalTitle').textContent = `${s.lastName||''} ${s.firstName||''} — ${s.idNumber||''}`;

            const row = (label, val, cls='') => val
                ? `<div class="flex gap-2"><span class="text-slate-500 font-medium min-w-[140px]">${label}:</span><span class="font-semibold text-slate-800 ${cls}">${val}</span></div>`
                : '';

            const dt  = s.uploadedAt?.toDate?.();
            const ds  = dt ? `${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}` : '—';

            document.getElementById('modalBody').innerHTML = `
                <div class="bg-slate-50 rounded-xl p-4 space-y-2">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">פרטי תלמיד</p>
                    ${row('שם מלא', `${s.lastName||''} ${s.firstName||''}`)}
                    ${row('ת.ז.', s.idNumber, 'font-mono')}
                    ${row('דרכון', s.passport, 'font-mono')}
                    ${row('תאריך לידה', s.birthDate)}
                    ${row('נייד', s.mobile, 'font-mono')}
                </div>
                <div class="bg-slate-50 rounded-xl p-4 space-y-2">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">כתובת</p>
                    ${row('עיר', s.city)}
                    ${row('רחוב', s.street)}
                    ${row("מס' בית", s.houseNum)}
                    ${row('דירה', s.apt)}
                    ${row('טלפון בית', s.homePhone, 'font-mono')}
                </div>
                <div class="bg-blue-50 rounded-xl p-4 space-y-2">
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-wide mb-3">פרטי אב</p>
                    ${row('שם', s.fatherName)}
                    ${row('ת.ז.', s.fatherId, 'font-mono')}
                    ${row('נייד', s.fatherMobile, 'font-mono')}
                </div>
                <div class="bg-pink-50 rounded-xl p-4 space-y-2">
                    <p class="text-xs font-bold text-pink-600 uppercase tracking-wide mb-3">פרטי אם</p>
                    ${row('שם', s.motherName)}
                    ${row('ת.ז.', s.motherId, 'font-mono')}
                    ${row('נייד', s.motherMobile, 'font-mono')}
                </div>
                ${s.parentEmail ? `<div class="bg-slate-50 rounded-xl p-4">${row('מייל הורים', s.parentEmail)}</div>` : ''}
                ${s.notes ? `<div class="bg-yellow-50 rounded-xl p-4">${row('הערות', s.notes)}</div>` : ''}
                <div class="bg-slate-50 rounded-xl p-4 space-y-2">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">מידע מערכת</p>
                    ${row('ישיבה קטנה', s.feederName)}
                    ${row('הוגש בתאריך', ds)}
                    <div class="flex gap-2"><span class="text-slate-500 font-medium min-w-[140px]">סטטוס:</span>
                        <span class="px-3 py-0.5 rounded-full text-xs font-bold ${statusCls[s.status]||'bg-slate-100'}">${statusLabel[s.status]||s.status}</span>
                    </div>
                </div>`;

            document.getElementById('detailModal').classList.remove('hidden');
        }

        async function setStatus(newStatus) {
            if (!selectedDocId) return;
            try {
                await db.collection('students').doc(selectedDocId).update({
                    status: newStatus,
                    statusUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    statusUpdatedBy: currentUser.uid
                });
                closeModal('detailModal');
            } catch(e) {
                alert('שגיאה בעדכון: ' + e.message);
            }
        }

        async function quickStatus(docId, status) {
            try {
                await db.collection('students').doc(docId).update({
                    status,
                    statusUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    statusUpdatedBy: currentUser.uid
                });
            } catch(e) { alert('שגיאה: ' + e.message); }
        }

        // ===== Create Feeder Modal =====
        function openCreateFeeder() {
            document.getElementById('newFeederName').value     = '';
            document.getElementById('newFeederEmail').value    = '';
            document.getElementById('newFeederPassword').value = '';
            document.getElementById('createFeederError').classList.add('hidden');
            document.getElementById('createFeederSuccess').classList.add('hidden');
            document.getElementById('createFeederModal').classList.remove('hidden');
        }

        async function createFeederAccount() {
            const name     = document.getElementById('newFeederName').value.trim();
            const email    = document.getElementById('newFeederEmail').value.trim();
            const password = document.getElementById('newFeederPassword').value;
            const errDiv   = document.getElementById('createFeederError');
            const succDiv  = document.getElementById('createFeederSuccess');
            errDiv.classList.add('hidden');
            succDiv.classList.add('hidden');

            if (!name || !email || !password) {
                errDiv.textContent = 'נא למלא את כל השדות.';
                errDiv.classList.remove('hidden');
                return;
            }
            if (password.length < 6) {
                errDiv.textContent = 'הסיסמה חייבת להיות לפחות 6 תווים.';
                errDiv.classList.remove('hidden');
                return;
            }

            document.getElementById('createBtnText').textContent = 'יוצר חשבון...';
            document.getElementById('createSpinner').classList.remove('hidden');
            document.getElementById('createFeederBtn').disabled = true;

            // Use a secondary Firebase app so admin doesn't get signed out
            let secondaryApp;
            try {
                secondaryApp = firebase.app('secondary');
            } catch(e) {
                secondaryApp = firebase.initializeApp(firebaseConfig, 'secondary');
            }
            const secAuth = secondaryApp.auth();

            try {
                const cred = await secAuth.createUserWithEmailAndPassword(email, password);
                const uid  = cred.user.uid;

                await db.collection('users').doc(uid).set({
                    email,
                    name,
                    role:      'feeder',
                    yeshivaId: currentUserData.yeshivaId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: currentUser.uid
                });

                await secAuth.signOut();

                succDiv.textContent = `✓ חשבון נוצר בהצלחה לישיבת "${name}" — מייל: ${email} — סיסמה: ${password}`;
                succDiv.classList.remove('hidden');
                document.getElementById('newFeederName').value     = '';
                document.getElementById('newFeederEmail').value    = '';
                document.getElementById('newFeederPassword').value = '';

            } catch(e) {
                const msgs = {
                    'auth/email-already-in-use': 'מייל זה כבר רשום במערכת.',
                    'auth/invalid-email':         'כתובת מייל לא תקינה.',
                    'auth/weak-password':         'הסיסמה חלשה מדי.',
                };
                errDiv.textContent = msgs[e.code] || e.message;
                errDiv.classList.remove('hidden');
            } finally {
                document.getElementById('createBtnText').textContent = 'צור חשבון';
                document.getElementById('createSpinner').classList.add('hidden');
                document.getElementById('createFeederBtn').disabled = false;
            }
        }

        // ===== Modals =====
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            selectedDocId = null;
        }

        // Close on backdrop click
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal('detailModal');
        });
        document.getElementById('createFeederModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal('createFeederModal');
        });
    </script>
</body>
</html>
